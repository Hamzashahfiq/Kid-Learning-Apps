<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numbers Tracing App</title>

<link rel="stylesheet" href="numt-style.css">
</head>

<body>

<h2 class="title">Numbers Tracing (1 - 20)</h2>

<div id="grid" class="grid"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden" onclick="outsideClick(event)">
  <div class="popup-box">

    <button class="popup-close" onclick="closePopup()">✕</button>

    <div class="trace-box">
      <canvas id="guideCanvas" width="320" height="260"></canvas>
      <canvas id="canvas" width="320" height="260"></canvas>
    </div>

    <div class="btn-row">
      <button onclick="prevItem()">◀ Prev</button>
      <button onclick="nextItem()">Next ▶</button>
      <button onclick="checkAccuracy()">Check</button>
    </div>

    <div id="msg" class="msg"></div>

  </div>
</div>

<button class="home-btn" onclick="window.location.href='../../main-index.html'">
  🏡 Home
</button>

<script src="numt-script.js"></script>
</body>
</html>
